<!-- Supabase → Authentication → Emails → "Reauthentication" → Message body (HTML)
     Subject suggestion: Your SushiGO verification code
     Variable used: {{ .Token }}  (a one-time code, NOT a link) -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0B0B0B;font-family:'Manrope',Arial,sans-serif;color:#F4ECD8;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0B0B0B;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#111;border-radius:12px;overflow:hidden;border:1px solid rgba(244,236,216,0.08);">
        <tr><td style="background:#E11D2A;padding:24px 32px;">
          <h1 style="margin:0;font-size:28px;font-weight:700;color:#F4ECD8;letter-spacing:-0.02em;">SUSHIGO</h1>
          <p style="margin:6px 0 0;font-size:14px;color:rgba(244,236,216,0.7);">Verify it's you</p>
        </td></tr>
        <tr><td style="padding:32px;">
          <p style="margin:0 0 24px;font-size:16px;line-height:1.6;">Enter the code below to confirm this action on your <strong>SushiGO</strong> account.</p>
          <div style="text-align:center;margin-bottom:24px;">
            <div style="display:inline-block;background:rgba(244,236,216,0.04);border:1px solid rgba(244,236,216,0.12);border-radius:10px;padding:18px 32px;font-size:34px;font-weight:700;letter-spacing:10px;color:#F4ECD8;">{{ .Token }}</div>
          </div>
          <p style="margin:0;font-size:13px;color:rgba(244,236,216,0.45);text-align:center;">This code expires shortly. If you didn't request it, you can safely ignore this email. Please do not reply.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
